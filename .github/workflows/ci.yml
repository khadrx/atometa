name: CI

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: af752f21c9d79ba3df9cb0250ce2233933f58486
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name:    Windows (x64)
            os:      windows-latest
            triplet: x64-windows-static

          - name:    Linux (x64)
            os:      ubuntu-24.04
            triplet: x64-linux

          - name:    macOS (arm64)
            os:      macos-14
            triplet: arm64-osx

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      # ── 2. Export GHA binary cache tokens ─────────────────────────────────
      - name: Export vcpkg binary cache env vars
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',     process.env.ACTIONS_CACHE_URL    || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── 3. System dependencies ─────────────────────────────────────────────
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build pkg-config curl zip unzip tar \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev \
            libwayland-dev libxkbcommon-dev

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja pkg-config

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --no-progress

      # ── 4. MSVC environment (Windows only) ────────────────────────────────
      - name: Setup MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 5. Resolve vcpkg path ──────────────────────────────────────────────
      # windows-latest ships vcpkg pre-installed at C:\vcpkg — use it directly.
      # Linux/macOS bootstrap from scratch (cached after first run).
      - name: Set VCPKG_DIR (Windows — use pre-installed)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Pin to our commit by updating the pre-installed copy
          cd /c/vcpkg
          git fetch --quiet
          git checkout "$VCPKG_COMMIT" --quiet 2>/dev/null || true
          echo "VCPKG_DIR=C:/vcpkg" >> "$GITHUB_ENV"

      - name: Cache vcpkg bootstrap (non-Windows)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        id: vcpkg-bootstrap
        with:
          path: ${{ github.workspace }}/vcpkg-src
          key: vcpkg-bootstrap-${{ runner.os }}-${{ env.VCPKG_COMMIT }}

      - name: Bootstrap vcpkg (non-Windows)
        if: runner.os != 'Windows' && steps.vcpkg-bootstrap.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}/vcpkg-src"
          cd "${{ github.workspace }}/vcpkg-src"
          git checkout "$VCPKG_COMMIT"
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Set VCPKG_DIR (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: echo "VCPKG_DIR=${{ github.workspace }}/vcpkg-src" >> "$GITHUB_ENV"

      # ── 6. Cache installed packages ────────────────────────────────────────
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: vcpkg-packages
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-pkgs-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-pkgs-${{ runner.os }}-${{ matrix.triplet }}-

      # ── 7. Install dependencies (retry on 502/503) ─────────────────────────
      - name: Install vcpkg dependencies
        if: steps.vcpkg-packages.outputs.cache-hit != 'true'
        shell: bash
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ runner.os == 'macOS' && '1' || '' }}
        run: |
          VCPKG_EXE="$VCPKG_DIR/vcpkg"
          [ "$RUNNER_OS" = "Windows" ] && VCPKG_EXE="$VCPKG_DIR/vcpkg.exe"

          INSTALL_ARGS=(
            --triplet=${{ matrix.triplet }}
            --vcpkg-root="$VCPKG_DIR"
            --x-install-root="${{ github.workspace }}/vcpkg_installed"
            --x-manifest-root="${{ github.workspace }}"
          )

          for attempt in 1 2 3; do
            echo "=== vcpkg install attempt $attempt/3 ==="
            "$VCPKG_EXE" install "${INSTALL_ARGS[@]}" && break
            [ $attempt -eq 3 ] && { echo "All 3 attempts failed"; exit 1; }
            echo "Retrying in 60s..."
            sleep 60
          done

      # ── 8. Configure ───────────────────────────────────────────────────────
      - name: Configure CMake
        shell: bash
        env:
          CC:  ${{ runner.os == 'Windows' && 'cl' || '' }}
          CXX: ${{ runner.os == 'Windows' && 'cl' || '' }}
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ runner.os == 'macOS' && '1' || '' }}
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DATOMETA_USE_PCH=OFF \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_DIR/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DVCPKG_INSTALLED_DIR="${{ github.workspace }}/vcpkg_installed"

      # ── 9. Build ───────────────────────────────────────────────────────────
      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      # ── 10. Package ────────────────────────────────────────────────────────
      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          tar -czf dist/atometa-${{ runner.os }}-${{ matrix.triplet }}.tar.gz \
            -C build/bin .

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          if command -v sha256sum &>/dev/null; then
            sha256sum *.tar.gz > hashes.sha256
          else
            shasum -a 256 *.tar.gz > hashes.sha256
          fi

      # ── 11. Upload ─────────────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atometa-${{ runner.os }}-${{ matrix.triplet }}
          path: dist/*
          retention-days: 7

      # ── 12. Release (tags only) ────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: false
